name: agentmd CI

on:
  pull_request:
    branches: [main]
    paths:
      - 'packages/agentmd/**'
      - '.github/workflows/agentmd-ci.yml'
      - 'tsconfig.base.json'
      - 'package.json'
  push:
    branches: [main]
    paths:
      - 'packages/agentmd/**'
      - '.github/workflows/agentmd-ci.yml'
      - 'tsconfig.base.json'
      - 'package.json'

permissions:
  contents: read

defaults:
  run:
    working-directory: packages/agentmd

jobs:
  build:
    name: Build & test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: npm

      - name: Install (workspace root)
        run: npm ci
        working-directory: .

      - run: npm run typecheck

      - run: npm test

      - run: npm run lint:examples

      - run: npm run build

  self-lint:
    name: Dogfood agentmd
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: npm

      - name: Install (workspace root)
        run: npm ci
        working-directory: .

      - run: npm run build

      - name: agentmd lint (examples)
        run: |
          node dist/cli.js lint examples/outreach-writer.md
          node dist/cli.js lint examples/minimal.md
