name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read
  security-events: write

jobs:
  isolint-compat:
    name: isolint compat (Node ${{ matrix.node }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: ["18.17", "20", "22"]
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: ${{ matrix.node }}
          cache: npm

      - run: npm ci

      - run: npm run typecheck --workspace @razroo/isolint

      - run: npm test --workspace @razroo/isolint

      - run: npm run build --workspace @razroo/isolint

  engine-floor:
    name: engine floor (${{ matrix.workspace }} on Node ${{ matrix.node }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - workspace: "@razroo/iso-harness"
            node: "18.17"
            extra: "npm run smoke --workspace @razroo/iso-harness"
          - workspace: "@razroo/iso-eval"
            node: "20.6.0"
            extra: ""
          - workspace: "@razroo/iso-route"
            node: "20.6.0"
            extra: ""
          - workspace: "@razroo/iso-orchestrator"
            node: "20.6.0"
            extra: ""
          - workspace: "@razroo/iso-ledger"
            node: "20.6.0"
            extra: ""
          - workspace: "@razroo/iso-context"
            node: "20.6.0"
            extra: ""
          - workspace: "@razroo/iso-cache"
            node: "20.6.0"
            extra: ""
          - workspace: "@razroo/iso-index"
            node: "20.6.0"
            extra: ""
          - workspace: "@razroo/iso-canon"
            node: "20.6.0"
            extra: ""
          - workspace: "@razroo/iso-timeline"
            node: "20.6.0"
            extra: ""
          - workspace: "@razroo/iso-preflight"
            node: "20.6.0"
            extra: ""
          - workspace: "@razroo/iso-postflight"
            node: "20.6.0"
            extra: ""
          - workspace: "@razroo/iso-migrate"
            node: "20.6.0"
            extra: ""
          - workspace: "@razroo/iso-contract"
            node: "20.6.0"
            extra: ""
          - workspace: "@razroo/iso-capabilities"
            node: "20.6.0"
            extra: ""
          - workspace: "@razroo/iso-trace"
            node: "20.6.0"
            extra: ""
          - workspace: "@razroo/iso-guard"
            node: "20.6.0"
            extra: ""
          - workspace: "@razroo/agentmd"
            node: "22.0.0"
            extra: ""
          - workspace: "@razroo/iso"
            node: "22.0.0"
            extra: ""
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: ${{ matrix.node }}
          cache: npm

      - run: npm ci

      - run: npm run typecheck --workspace ${{ matrix.workspace }} --if-present

      - run: npm test --workspace ${{ matrix.workspace }} --if-present

      - run: npm run build --workspace ${{ matrix.workspace }} --if-present

      - if: ${{ matrix.extra != '' }}
        run: ${{ matrix.extra }}

  build-test-lint:
    name: build-test-lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: npm

      - run: npm ci

      - name: Fetch PR base branch
        if: ${{ github.event_name == 'pull_request' }}
        run: git fetch --no-tags --depth=1 origin ${{ github.base_ref }}

      - name: changeset status
        if: ${{ github.event_name == 'pull_request' }}
        run: npm run changeset:status

      - name: patch hygiene
        if: ${{ github.event_name == 'pull_request' }}
        run: git diff --check origin/${{ github.base_ref }}...HEAD

      - run: npm run typecheck --workspaces --if-present

      - run: npm run test --workspaces --if-present

      - run: npm run build --workspaces --if-present

      - name: agentmd lint (examples)
        working-directory: packages/agentmd
        run: |
          node dist/cli.js lint examples/outreach-writer.md
          node dist/cli.js lint examples/minimal.md

      - name: isolint lint (SARIF)
        working-directory: packages/isolint
        run: node dist/cli/index.js lint . --format sarif --fail-on warn > isolint.sarif
        continue-on-error: true

      - name: Upload SARIF to GitHub code scanning
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: packages/isolint/isolint.sarif
          category: isolint

      - name: isolint lint (enforce)
        working-directory: packages/isolint
        run: node dist/cli/index.js lint . --fail-on error

      - name: Pipeline integration (build/feedback toolchain)
        run: node examples/pipeline/build.mjs

      - name: iso wrapper dogfood integration
        run: npm run test:dogfood

      - name: iso-eval example suite
        run: node packages/iso-eval/dist/cli.js run packages/iso-eval/examples/suites/echo-basic/eval.yml

      - name: iso-trace example stats
        run: node packages/iso-trace/dist/cli.js stats --source packages/iso-trace/examples/sample-session.jsonl

      - name: iso-guard example audit
        run: |
          cat > /tmp/iso-guard-events.json <<'JSON'
          [
            { "type": "tool_call", "name": "geometra_disconnect", "data": { "round": 1 } },
            { "type": "tool_call", "name": "task", "data": { "round": 1, "mode": "apply" } },
            { "type": "tool_call", "name": "job-forge-merge" },
            { "type": "tool_call", "name": "job-forge-verify" }
          ]
          JSON
          node packages/iso-guard/dist/cli.js audit packages/iso-guard/examples/jobforge-apply.yaml --events /tmp/iso-guard-events.json

      - name: iso-ledger example verify/query
        run: |
          node packages/iso-ledger/dist/cli.js verify --ledger packages/iso-ledger/examples/jobforge-events.jsonl
          node packages/iso-ledger/dist/cli.js has --ledger packages/iso-ledger/examples/jobforge-events.jsonl --key "url:https://example.test/jobs/123"

      - name: iso-context example plan/render
        run: |
          node packages/iso-context/dist/cli.js list --policy packages/iso-context/examples/jobforge-context.json
          node packages/iso-context/dist/cli.js check apply --policy packages/iso-context/examples/jobforge-context.json --root packages/iso-context/examples/jobforge-project --budget 20000
          node packages/iso-context/dist/cli.js render apply --policy packages/iso-context/examples/jobforge-context.json --root packages/iso-context/examples/jobforge-project --target markdown

      - name: iso-cache example store/verify
        run: |
          node packages/iso-cache/dist/cli.js put "jd:example" --cache /tmp/iso-cache-example --kind jd --ttl 7d --meta '{"url":"https://example.test/jobs/123"}' --input @packages/iso-cache/examples/job-description.md
          node packages/iso-cache/dist/cli.js has "jd:example" --cache /tmp/iso-cache-example
          node packages/iso-cache/dist/cli.js verify --cache /tmp/iso-cache-example

      - name: iso-index example build/query
        run: |
          node packages/iso-index/dist/cli.js build --config packages/iso-index/examples/jobforge-index.json --root packages/iso-index/examples/jobforge-project --out /tmp/jobforge.iso-index.json
          node packages/iso-index/dist/cli.js has --index /tmp/jobforge.iso-index.json --key "company-role:example-labs:staff-agent-engineer"
          node packages/iso-index/dist/cli.js query --index /tmp/jobforge.iso-index.json --kind jobforge.report.url --key "url:https://example.test/jobs/123"
          node packages/iso-index/dist/cli.js verify --index /tmp/jobforge.iso-index.json

      - name: iso-canon example normalize/compare
        run: |
          node packages/iso-canon/dist/cli.js normalize company "OpenAI, Inc." --config packages/iso-canon/examples/jobforge-canon.json --profile jobforge
          node packages/iso-canon/dist/cli.js key company-role --company "Anthropic, PBC" --role "Senior SWE, AI Platform - Remote US" --config packages/iso-canon/examples/jobforge-canon.json --profile jobforge
          node packages/iso-canon/dist/cli.js compare company "OpenAI, Inc." "Open AI" --config packages/iso-canon/examples/jobforge-canon.json --profile jobforge

      - name: iso-timeline example plan/check
        run: |
          node packages/iso-timeline/dist/cli.js plan --config packages/iso-timeline/examples/jobforge-timeline.json --events packages/iso-timeline/examples/jobforge-events.jsonl --now 2026-04-27T00:00:00.000Z --out /tmp/jobforge.iso-timeline.json
          node packages/iso-timeline/dist/cli.js due --config packages/iso-timeline/examples/jobforge-timeline.json --events packages/iso-timeline/examples/jobforge-events.jsonl --now 2026-04-27T00:00:00.000Z
          node packages/iso-timeline/dist/cli.js verify --timeline /tmp/jobforge.iso-timeline.json
          node packages/iso-timeline/dist/cli.js check --config packages/iso-timeline/examples/jobforge-timeline.json --events packages/iso-timeline/examples/jobforge-events.jsonl --now 2026-04-27T00:00:00.000Z --fail-on none

      - name: iso-preflight example plan/check
        run: |
          node packages/iso-preflight/dist/cli.js plan --config packages/iso-preflight/examples/jobforge-preflight.json --candidates packages/iso-preflight/examples/jobforge-candidates.json
          node packages/iso-preflight/dist/cli.js check --config packages/iso-preflight/examples/jobforge-preflight.json --candidates packages/iso-preflight/examples/jobforge-candidates.json

      - name: iso-postflight example status/check
        run: |
          node packages/iso-postflight/dist/cli.js status --config packages/iso-postflight/examples/jobforge-postflight.json --plan packages/iso-postflight/examples/jobforge-plan.json --outcomes packages/iso-postflight/examples/jobforge-outcomes-partial.json
          node packages/iso-postflight/dist/cli.js check --config packages/iso-postflight/examples/jobforge-postflight.json --plan packages/iso-postflight/examples/jobforge-plan.json --outcomes packages/iso-postflight/examples/jobforge-outcomes-complete.json

      - name: iso-migrate example plan/apply/check
        run: |
          mkdir -p /tmp/iso-migrate-smoke
          cat > /tmp/iso-migrate-smoke/package.json <<'JSON'
          {
            "private": true,
            "scripts": {
              "verify": "job-forge verify"
            },
            "dependencies": {
              "job-forge": "^2.14.22"
            }
          }
          JSON
          cat > /tmp/iso-migrate-smoke/.gitignore <<'EOF'
          # Generated
          .resolved-prompt-*
          node_modules/
          EOF
          node packages/iso-migrate/dist/cli.js plan --config packages/iso-migrate/examples/jobforge-consumer-migrations.json --root /tmp/iso-migrate-smoke
          node packages/iso-migrate/dist/cli.js apply --config packages/iso-migrate/examples/jobforge-consumer-migrations.json --root /tmp/iso-migrate-smoke
          node packages/iso-migrate/dist/cli.js check --config packages/iso-migrate/examples/jobforge-consumer-migrations.json --root /tmp/iso-migrate-smoke

      - name: iso-contract example validate/render
        run: |
          node packages/iso-contract/dist/cli.js validate jobforge.tracker-row --contracts packages/iso-contract/examples/jobforge-contracts.json --input @packages/iso-contract/examples/tracker-row.json
          node packages/iso-contract/dist/cli.js render jobforge.tracker-row --contracts packages/iso-contract/examples/jobforge-contracts.json --input @packages/iso-contract/examples/tracker-row.json --format tsv

      - name: iso-capabilities example check/render
        run: |
          node packages/iso-capabilities/dist/cli.js list --policy packages/iso-capabilities/examples/jobforge-capabilities.json
          node packages/iso-capabilities/dist/cli.js check applicant --policy packages/iso-capabilities/examples/jobforge-capabilities.json --tool browser --mcp geometra --command "npx job-forge merge" --filesystem write --network restricted
          node packages/iso-capabilities/dist/cli.js render applicant --policy packages/iso-capabilities/examples/jobforge-capabilities.json --target opencode

      - name: iso-route example build (dry-run + verify)
        run: node packages/iso-route/dist/cli.js build packages/iso-route/examples/models.yaml --out /tmp/iso-route-smoke --dry-run --verify-models

      - name: iso-route example plan
        run: node packages/iso-route/dist/cli.js plan packages/iso-route/examples/models.yaml

      - name: packaged tarball smoke
        run: npm run test:pack

      - name: iso-harness smoke build
        working-directory: packages/iso-harness
        run: npm run smoke

      - name: Verify iso-harness expected output files exist
        run: |
          set -e
          OUT=/tmp/iso-harness-smoke
          for f in \
            "$OUT/CLAUDE.md" \
            "$OUT/.claude/agents/researcher.md" \
            "$OUT/.claude/commands/review.md" \
            "$OUT/.mcp.json" \
            "$OUT/.cursor/rules/main.mdc" \
            "$OUT/.cursor/mcp.json" \
            "$OUT/AGENTS.md" \
            "$OUT/.codex/config.toml" \
            "$OUT/opencode.json" \
            "$OUT/.opencode/agents/researcher.md" \
            "$OUT/.opencode/skills/review.md"
          do
            if [ ! -f "$f" ]; then
              echo "::error::missing expected output: $f"
              exit 1
            fi
          done
          echo "All 11 expected output files present."

  ci-required:
    name: ci-required
    runs-on: ubuntu-latest
    needs:
      - build-test-lint
      - engine-floor
      - isolint-compat
    if: ${{ always() }}
    steps:
      - name: Verify all required CI jobs passed
        run: |
          if [ "${{ needs.build-test-lint.result }}" != "success" ]; then
            echo "::error::build-test-lint result: ${{ needs.build-test-lint.result }}"
            exit 1
          fi
          if [ "${{ needs.engine-floor.result }}" != "success" ]; then
            echo "::error::engine-floor result: ${{ needs.engine-floor.result }}"
            exit 1
          fi
          if [ "${{ needs.isolint-compat.result }}" != "success" ]; then
            echo "::error::isolint-compat result: ${{ needs.isolint-compat.result }}"
            exit 1
          fi
          echo "All required CI jobs passed."
