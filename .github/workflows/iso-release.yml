name: iso Release

on:
  release:
    types: [published]

permissions:
  contents: read
  id-token: write

defaults:
  run:
    working-directory: packages/iso

jobs:
  publish:
    name: Publish @razroo/iso to npm
    if: startsWith(github.ref_name, 'iso-v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"
          cache: npm

      - name: Verify CI build-test-lint passed for release commit
        uses: ./.github/actions/verify-release-gate
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Verify tag matches package.json version
        run: |
          TAG="${GITHUB_REF_NAME#iso-v}"
          PKG="$(node -p "require('./package.json').version")"
          if [ "$TAG" != "$PKG" ]; then
            echo "::error::Tag $GITHUB_REF_NAME does not match packages/iso/package.json version $PKG"
            exit 1
          fi

      - name: Install (workspace root)
        run: npm ci
        working-directory: .

      - run: npm run build --workspace @razroo/agentmd
        working-directory: .

      - run: npm run build --workspace @razroo/isolint
        working-directory: .

      - run: npm test

      - name: Publish
        run: npm publish --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
