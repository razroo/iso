name: agentmd Release

# Publish @razroo/agentmd to npm when a GitHub Release whose tag starts
# with `agentmd-v` is published.
#
# Cutting a release:
#   cd packages/agentmd
#   npm version patch              # bumps version in packages/agentmd/package.json
#   TAG="agentmd-v$(node -p 'require(\"./package.json\").version')"
#   git tag "$TAG" && git push origin "$TAG"
#   gh release create "$TAG" --generate-notes --title "$TAG"

on:
  release:
    types: [published]

permissions:
  contents: read
  checks: read
  id-token: write

defaults:
  run:
    working-directory: packages/agentmd

jobs:
  publish:
    name: Publish @razroo/agentmd to npm
    if: startsWith(github.ref_name, 'agentmd-v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"
          cache: npm

      - name: Verify required CI passed for release commit
        uses: ./.github/actions/verify-release-gate
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Verify tag matches package.json version
        run: |
          TAG="${GITHUB_REF_NAME#agentmd-v}"
          PKG="$(node -p "require('./package.json').version")"
          if [ "$TAG" != "$PKG" ]; then
            echo "::error::Tag $GITHUB_REF_NAME does not match packages/agentmd/package.json version $PKG"
            exit 1
          fi

      - name: Install (workspace root)
        run: npm ci
        working-directory: .

      - run: npm test

      - run: npm run build

      - name: Publish
        run: npm publish --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
